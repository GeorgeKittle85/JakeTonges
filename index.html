<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CipherRoom — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase loaded dynamically at login time via sequential script loader -->

<style>
  :root {
    --bg:       #07080f;
    --surface:  #0d0f1c;
    --card:     #111425;
    --card2:    #171b30;
    --border:   #1e2440;
    --border2:  #2a3058;
    --accent:   #e8b84b;
    --accent2:  #c47f20;
    --green:    #3ecf8e;
    --blue:     #4e9ef7;
    --red:      #e05060;
    --text:     #dde3f5;
    --muted:    #5a6490;
    --muted2:   #3a4470;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
    --display:  'Rajdhani', sans-serif;
    --radius:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Subtle grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,184,75,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,184,75,.018) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Gate screen ── */
  #gateScreen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .gate-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 80px rgba(232,184,75,.05), 0 24px 48px rgba(0,0,0,.6);
  }
  .gate-logo {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: .04em;
    margin-bottom: 4px;
  }
  .gate-logo span { color: var(--accent); }
  .gate-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .gate-label {
    display: block;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 7px;
  }
  .gate-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    letter-spacing: .06em;
    transition: border-color .2s, box-shadow .2s;
    margin-bottom: 14px;
  }
  .gate-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,184,75,.1); }
  .gate-input.invalid { border-color: var(--red); }
  .gate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #1a1000;
    font-family: var(--display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .05em;
    padding: 13px;
    cursor: pointer;
    transition: opacity .18s, transform .18s;
  }
  .gate-btn:hover { opacity: .88; transform: translateY(-1px); }
  .gate-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 10px; }
  .gate-error { color: var(--red); font-size: 12px; font-family: var(--mono); margin-top: 8px; display: none; }

  /* ── Dashboard ── */
  #dashScreen { flex: 1; display: flex; flex-direction: column; animation: fadeIn .3s ease; }

  /* Header */
  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }
  .dash-logo { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: .04em; }
  .dash-logo span { color: var(--accent); }
  .dash-logo small { font-size: 13px; color: var(--muted); font-family: var(--mono); font-weight: 400; margin-left: 10px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--green); animation: pulse 2s infinite; }
  .dot-amber { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .btn-sm {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--mono);
    padding: 6px 14px;
    cursor: pointer;
    transition: all .18s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-cell {
    flex: 1;
    background: var(--surface);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-value {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Main layout */
  .dash-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .sidebar-section-label {
    padding: 14px 16px 6px;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    border-top: 1px solid var(--border);
  }
  .sidebar-section-label:first-child { border-top: none; }
  .room-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background .15s;
    border-left: 3px solid transparent;
  }
  .room-item:hover { background: var(--card); }
  .room-item.active { background: var(--card); border-left-color: var(--accent); }
  .room-item .room-icon { font-size: 14px; }
  .room-item .room-name {
    font-size: 13px;
    font-family: var(--mono);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .room-item .room-count {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--card2);
    border-radius: 10px;
    padding: 1px 7px;
  }
  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }
  .user-avatar-sm {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  /* Main panel */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }
  .panel-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: .03em;
  }
  .panel-title span { color: var(--accent); }
  .panel-actions { display: flex; gap: 8px; }

  /* Filter/search */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .search-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
    width: 200px;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .filter-label { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* Message table */
  .msg-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .msg-scroll::-webkit-scrollbar { width: 5px; }
  .msg-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--card2);
    border-bottom: 1px solid var(--border2);
    padding: 10px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    z-index: 2;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  tbody tr:hover { background: var(--card); }
  td {
    padding: 10px 16px;
    vertical-align: top;
    line-height: 1.5;
  }
  td.col-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: pre;   /* preserve the newline between date and time */
    width: 150px;
    line-height: 1.6;
  }
  td.col-room {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blue);
    white-space: nowrap;
    width: 130px;
  }
  td.col-user {
    width: 120px;
    white-space: nowrap;
  }
  .user-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .user-pill .dot-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--green));
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  td.col-msg { word-break: break-word; max-width: 420px; }
  .msg-text { color: var(--text); }
  .msg-failed {
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    font-style: italic;
  }
  .enc-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .04em;
  }
  .decrypting {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    font-style: italic;
    animation: blink .8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Empty / loading states */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .state-icon { font-size: 36px; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Export toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--mono);
    transition: transform .3s cubic-bezier(.22,.61,.36,1), opacity .3s;
    opacity: 0;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .hidden { display: none !important; }

  @media (max-width: 680px) {
    .sidebar { width: 180px; min-width: 180px; }
    .search-input { width: 140px; }
    td.col-msg { max-width: 200px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ═══════════ GATE SCREEN ═══════════ -->
  <div id="gateScreen">
    <div class="gate-card">
      <div class="gate-logo">Cipher<span>Room</span></div>
      <div class="gate-sub">Admin Dashboard</div>

      <label class="gate-label" for="gatePass">Admin passphrase</label>
      <input class="gate-input" id="gatePass" type="password"
             placeholder="Enter admin passphrase" maxlength="32" autocomplete="off"/>
      <button class="gate-btn" id="gateBtn">Access Dashboard →</button>
      <div class="gate-hint">Enter your passphrase to verify access.</div>
      <div class="gate-error" id="gateError">Incorrect passphrase — access denied.</div>
    </div>
  </div>

  <!-- ═══════════ DASHBOARD ═══════════ -->
  <div id="dashScreen" class="hidden">

    <header class="dash-header">
      <div>
        <div class="dash-logo">Cipher<span>Room</span> <small>/ Admin</small></div>
      </div>
      <div class="header-right">
        <div class="badge"><div class="dot dot-green"></div><span id="liveLabel">Live</span></div>
        <button class="btn-sm" id="refreshBtn">↻ Refresh</button>
        <button class="btn-sm" id="exportBtn">⬇ Export CSV</button>
        <button class="btn-sm btn-danger" id="logoutBtn">Logout</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-value" id="statRooms">—</div>
        <div class="stat-label">Rooms</div>
      </div>
      <div class="stat-cell">
        <div class="stat-value" id="statUsers">—</div>
        <div class="stat-label">Unique Users</div>
      </div>
      <div class="stat-cell">
        <div class="stat-value" id="statMessages">—</div>
        <div class="stat-label">Total Messages</div>
      </div>
      <div class="stat-cell">
        <div class="stat-value" id="statDecrypted">—</div>
        <div class="stat-label">Decrypted</div>
      </div>
    </div>

    <!-- Body -->
    <div class="dash-body">

      <!-- Sidebar -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-section-label">Rooms</div>
        <div id="roomList"><div class="user-item">Loading…</div></div>
        <div class="sidebar-section-label">All Users</div>
        <div id="userList"><div class="user-item">Loading…</div></div>
      </nav>

      <!-- Main panel -->
      <div class="main-panel">
        <div class="panel-header">
          <div class="panel-title" id="panelTitle">All Messages</div>
          <div class="panel-actions">
            <span id="decryptStatus" style="font-size:12px;font-family:var(--mono);color:var(--muted);"></span>
          </div>
        </div>

        <div class="filter-bar">
          <span class="filter-label">Filter:</span>
          <input class="search-input" id="searchInput" type="text" placeholder="Search messages or users…"/>
        </div>

        <div class="msg-scroll" id="msgScroll">
          <div class="state-box" id="loadingState">
            <div class="spinner"></div>
            <span>Loading messages…</span>
          </div>
          <table id="msgTable" class="hidden">
            <thead>
              <tr>
                <th>Time</th>
                <th>Room</th>
                <th>User</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="msgBody"></tbody>
          </table>
          <div class="state-box hidden" id="emptyState">
            <div class="state-icon">💬</div>
            <span>No messages found.</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   FIREBASE CONFIG  (same project as main chat)
═══════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDoibf9MS1LB6ZY6kAMh-sKrJOVspvA-hA",
  authDomain:        "cipherroom-d08de.firebaseapp.com",
  databaseURL:       "https://cipherroom-d08de-default-rtdb.firebaseio.com",
  projectId:         "cipherroom-d08de",
  storageBucket:     "cipherroom-d08de.firebasestorage.app",
  messagingSenderId: "146721483194",
  appId:             "1:146721483194:web:f0a37809a3b557d1501583"
};

// internal state
let _k = null;  // active key material — set only after live verification

// core decode primitives — intentionally unlabelled
function _b2a(b){const n=atob(b),a=new Uint8Array(n.length);for(let i=0;i<n.length;i++)a[i]=n.charCodeAt(i);return a.buffer;}
async function _dk(p,s,r=150000){const e=new TextEncoder(),m=await crypto.subtle.importKey('raw',e.encode(p),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:r,hash:'SHA-256'},m,{name:'AES-GCM',length:256},true,['encrypt','decrypt']);}
async function _dp(v,p){const t=v.split(':');if(t[0]!=='AESGCM'||t[1]!=='PBKDF2'||t.length<5)throw 0;const k=await _dk(p,_b2a(t[2])),x=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(_b2a(t[3])),tagLength:128},k,_b2a(t.slice(4).join(':')));return new TextDecoder().decode(x);}

// attempt to decode a raw ciphertext string with the given key
async function _try(raw, key) {
  const s = (raw.startsWith('L2AES:') ? raw.slice(6) : raw).split(':::').map(x=>x.trim()).filter(Boolean);
  for (const p of s) { try { return await _dp(p, key); } catch(_){} }
  throw new Error('x');
}

// state
let allMessages = [], activeRoom = null, searchQuery = '';

document.addEventListener('DOMContentLoaded', function () {

const gateScreen  = document.getElementById('gateScreen');
const dashScreen  = document.getElementById('dashScreen');
const gatePassEl  = document.getElementById('gatePass');
const gateBtnEl   = document.getElementById('gateBtn');
const gateErrorEl = document.getElementById('gateError');

gateBtnEl.addEventListener('click', attemptGate);
gatePassEl.addEventListener('keydown', e => { if (e.key === 'Enter') attemptGate(); });

// Verify by actually decrypting a real message — no hardcoded password anywhere
async function attemptGate() {
  const val = gatePassEl.value;
  if (!val) return;

  gateBtnEl.disabled = true;
  gateBtnEl.textContent = 'Verifying…';
  gateErrorEl.style.display = 'none';
  gatePassEl.classList.remove('invalid');

  try {
    // Pull a sample of real messages to test against
    const base = DB_URL.replace(/\/+$/, '');
    let res = await fetch(`${base}/rooms.json`, { mode:'cors', headers:{'Accept':'application/json'} });
    if (!res.ok) throw new Error('fetch_fail');
    const rooms = await res.json();

    if (!rooms) {
      // No messages exist yet — cannot verify
      gateErrorEl.textContent = 'No messages exist yet. Cannot verify.';
      gateErrorEl.style.display = 'block';
      gateBtnEl.disabled = false;
      gateBtnEl.textContent = 'Access Dashboard →';
      return;
    }

    // Collect up to 5 ciphertexts to test the key against
    const samples = [];
    outer: for (const room of Object.values(rooms)) {
      if (!room.messages) continue;
      for (const msg of Object.values(room.messages)) {
        if (msg.ciphertext) { samples.push(msg.ciphertext); }
        if (samples.length >= 5) break outer;
      }
    }

    if (samples.length === 0) {
      gateErrorEl.textContent = 'No messages exist yet. Cannot verify.';
      gateErrorEl.style.display = 'block';
      gateBtnEl.disabled = false;
      gateBtnEl.textContent = 'Access Dashboard →';
      return;
    }

    // Try the entered key against the samples — each message has two
    // independently encrypted slots; we try each slot with the provided key.
    // If even one succeeds the key is correct.
    let verified = false;
    for (const ct of samples) {
      try { await _try(ct, val); verified = true; break; } catch(_) {}
    }

    if (!verified) {
      gatePassEl.classList.add('invalid');
      gateErrorEl.textContent = 'Access denied.';
      gateErrorEl.style.display = 'block';
      gatePassEl.value = '';
      gateBtnEl.disabled = false;
      gateBtnEl.textContent = 'Access Dashboard →';
      return;
    }

    // Key verified against live data — proceed
    _k = val;
    gateScreen.classList.add('hidden');
    dashScreen.classList.remove('hidden');
    initFirebaseAndLoad();

  } catch(e) {
    gateErrorEl.textContent = e.message === 'fetch_fail'
      ? 'Could not reach database — check connection.'
      : 'Verification error.';
    gateErrorEl.style.display = 'block';
    gateBtnEl.disabled = false;
    gateBtnEl.textContent = 'Access Dashboard →';
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  _k = null;
  allMessages = [];
  activeRoom  = null;
  dashScreen.classList.add('hidden');
  gateScreen.classList.remove('hidden');
  gatePassEl.value = '';
  gatePassEl.classList.remove('invalid');
  gateErrorEl.style.display = 'none';
  gateErrorEl.textContent = 'Access denied.';
  gateBtnEl.disabled = false;
  gateBtnEl.textContent = 'Access Dashboard →';
});

/* ═══════════════════════════════════════════════
   FIREBASE REST API  — zero SDK, zero CDN
   Uses plain fetch() against the Realtime Database
   REST endpoint. Works everywhere, always.
═══════════════════════════════════════════════ */
const DB_URL = FIREBASE_CONFIG.databaseURL;

async function firebaseGet(path) {
  // Strip any trailing slash from DB_URL, ensure clean path join
  const base = DB_URL.replace(/\/+$/, '');
  const url  = `${base}/${path}.json`;

  let res;
  try {
    res = await fetch(url, {
      method:  'GET',
      mode:    'cors',
      headers: { 'Accept': 'application/json' }
    });
  } catch (networkErr) {
    // Network-level failure (CORS, offline, DNS) — give a specific message
    throw new Error(
      `Network error reaching Firebase — is the database URL correct? (${networkErr.message})`
    );
  }

  if (!res.ok) {
    if (res.status === 401 || res.status === 403)
      throw new Error(`Permission denied (${res.status}) — check Firebase Rules allow .read on rooms`);
    throw new Error(`Firebase REST error ${res.status}: ${res.statusText}`);
  }
  return res.json();
}

function initFirebaseAndLoad() {
  // Sanity-check the database URL before attempting any fetch
  if (!DB_URL || !DB_URL.startsWith('https://')) {
    showToast('Invalid Firebase databaseURL in config — check FIREBASE_CONFIG.databaseURL');
    console.error('DB_URL:', DB_URL);
    return;
  }
  loadAllData();
}

async function loadAllData() {
  showLoadingState();
  allMessages = [];

  try {
    const roomsData = await firebaseGet('rooms');

    if (!roomsData) {
      updateStats(0, 0, 0, 0);
      renderSidebar([]);
      showEmptyState();
      return;
    }

    const roomNames = Object.keys(roomsData);
    let rawMessages = [];

    // Collect all messages from all rooms
    for (const roomName of roomNames) {
      const msgs = roomsData[roomName].messages;
      if (!msgs) continue;
      for (const [key, val] of Object.entries(msgs)) {
        rawMessages.push({
          key,
          room:       roomName,
          user:       val.user || 'Unknown',
          timestamp:  val.timestamp || 0,
          ciphertext: val.ciphertext || ''
        });
      }
    }

    // Sort all messages by timestamp ascending
    rawMessages.sort((a, b) => a.timestamp - b.timestamp);

    // Decrypt all messages
    let decryptedCount = 0;
    const total = rawMessages.length;
    updateDecryptStatus(0, total);

    allMessages = await Promise.all(rawMessages.map(async (msg, i) => {
      let plaintext = null;
      let failed    = false;
      try {
        plaintext = await _try(msg.ciphertext, _k);
        decryptedCount++;
      } catch (_) {
        failed    = true;
        plaintext = null;
      }
      if (i % 10 === 0) updateDecryptStatus(Math.min(i + 10, total), total);
      return { ...msg, plaintext, failed };
    }));

    updateDecryptStatus(total, total);

    // Build stats
    const uniqueUsers = new Set(allMessages.map(m => m.user));
    updateStats(roomNames.length, uniqueUsers.size, total, decryptedCount);

    renderSidebar(roomNames, allMessages);
    renderTable();

  } catch (e) {
    console.error('Load error:', e);
    // Show the specific error message so it's obvious what went wrong
    showToast('Load failed: ' + (e.message || String(e)));
    showEmptyState();
  }
}

/* ═══════════════════════════════════════════════
   RENDER — SIDEBAR
═══════════════════════════════════════════════ */
function renderSidebar(roomNames, messages = []) {
  const roomList = document.getElementById('roomList');
  const userList = document.getElementById('userList');

  // Rooms
  roomList.innerHTML = '';

  // "All" option
  const allItem = document.createElement('div');
  allItem.className = 'room-item' + (activeRoom === null ? ' active' : '');
  allItem.innerHTML = `
    <span class="room-icon">#</span>
    <span class="room-name">All Rooms</span>
    <span class="room-count">${messages.length}</span>
  `;
  allItem.addEventListener('click', () => selectRoom(null, allItem));
  roomList.appendChild(allItem);

  for (const name of roomNames) {
    const count = messages.filter(m => m.room === name).length;
    const item  = document.createElement('div');
    item.className = 'room-item' + (activeRoom === name ? ' active' : '');
    item.innerHTML = `
      <span class="room-icon">🔒</span>
      <span class="room-name">${escHtml(name)}</span>
      <span class="room-count">${count}</span>
    `;
    item.addEventListener('click', () => selectRoom(name, item));
    roomList.appendChild(item);
  }

  // Users
  userList.innerHTML = '';
  const uniqueUsers = [...new Set(messages.map(m => m.user))].sort();
  if (uniqueUsers.length === 0) {
    userList.innerHTML = '<div class="user-item">No users yet</div>';
  } else {
    for (const user of uniqueUsers) {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-avatar-sm">${escHtml(user[0].toUpperCase())}</div>
        <span>${escHtml(user)}</span>
      `;
      userList.appendChild(div);
    }
  }
}

function selectRoom(name, itemEl) {
  activeRoom = name;
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  itemEl.classList.add('active');
  const titleEl = document.getElementById('panelTitle');
  titleEl.innerHTML = name
    ? `Room: <span>#${escHtml(name)}</span>`
    : 'All Messages';
  renderTable();
}

/* ═══════════════════════════════════════════════
   RENDER — TABLE
═══════════════════════════════════════════════ */
function renderTable() {
  const tbody      = document.getElementById('msgBody');
  const table      = document.getElementById('msgTable');
  const emptyState = document.getElementById('emptyState');
  const loadState  = document.getElementById('loadingState');

  loadState.classList.add('hidden');

  let rows = allMessages;

  // Filter by active room
  if (activeRoom !== null) {
    rows = rows.filter(m => m.room === activeRoom);
  }

  // Filter by search query
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(m =>
      m.user.toLowerCase().includes(q) ||
      (!m.failed && m.plaintext.toLowerCase().includes(q)) ||
      m.room.toLowerCase().includes(q)
    );
  }

  tbody.innerHTML = '';

  if (rows.length === 0) {
    table.classList.add('hidden');
    emptyState.classList.remove('hidden');
    return;
  }

  table.classList.remove('hidden');
  emptyState.classList.add('hidden');

  const frag = document.createDocumentFragment();
  for (const msg of rows) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-time">${formatDateTime(msg.timestamp)}</td>
      <td class="col-room">#${escHtml(msg.room)}</td>
      <td class="col-user">
        <div class="user-pill">
          <div class="dot-avatar">${escHtml(msg.user[0].toUpperCase())}</div>
          ${escHtml(msg.user)}
        </div>
      </td>
      <td class="col-msg">
        ${msg.failed
          ? `<span class="enc-chip">&#x2713; Encrypted</span>`
          : `<span class="msg-text">${escHtml(msg.plaintext)}</span>`}
      </td>
    `;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
}

/* ═══════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderTable();
});

/* ═══════════════════════════════════════════════
   REFRESH
═══════════════════════════════════════════════ */
document.getElementById('refreshBtn').addEventListener('click', () => {
  activeRoom  = null;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('panelTitle').innerHTML = 'All Messages';
  loadAllData();
  showToast('Refreshed.');
});

/* ═══════════════════════════════════════════════
   EXPORT CSV
═══════════════════════════════════════════════ */
document.getElementById('exportBtn').addEventListener('click', () => {
  let rows = allMessages;
  if (activeRoom !== null) rows = rows.filter(m => m.room === activeRoom);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(m =>
      m.user.toLowerCase().includes(q) ||
      (!m.failed && m.plaintext.toLowerCase().includes(q)) ||
      m.room.toLowerCase().includes(q)
    );
  }

  if (rows.length === 0) { showToast('Nothing to export.'); return; }

  const header = ['Timestamp', 'Room', 'User', 'Message'];
  const csvRows = [
    header.join(','),
    ...rows.map(m => [
      formatDateTime(m.timestamp),
      m.room,
      m.user,
      m.failed ? 'Failed to Read.' : m.plaintext
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
  ];

  const blob = new Blob([csvRows.join('\n')], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `cipherroom-export-${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${rows.length} messages.`);
});

/* ═══════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════ */
function updateStats(rooms, users, messages, decrypted) {
  document.getElementById('statRooms').textContent    = rooms;
  document.getElementById('statUsers').textContent    = users;
  document.getElementById('statMessages').textContent = messages;
  document.getElementById('statDecrypted').textContent = decrypted;
}
function updateDecryptStatus(done, total) {
  const el = document.getElementById('decryptStatus');
  if (done >= total && total > 0) {
    el.textContent = `✓ ${done} / ${total} decrypted`;
    el.style.color = 'var(--green)';
  } else if (total > 0) {
    el.textContent = `Decrypting… ${done} / ${total}`;
    el.style.color = 'var(--muted)';
  } else {
    el.textContent = '';
  }
}
function showLoadingState() {
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('msgTable').classList.add('hidden');
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('msgBody').innerHTML = '';
  updateStats('—','—','—','—');
  document.getElementById('roomList').innerHTML = '<div class="user-item">Loading…</div>';
  document.getElementById('userList').innerHTML = '<div class="user-item">Loading…</div>';
}
function showEmptyState() {
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('msgTable').classList.add('hidden');
  document.getElementById('emptyState').classList.remove('hidden');
}
function formatDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const date = d.toLocaleDateString([], {year:'numeric', month:'short', day:'numeric'});
  const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  return date + '\n' + time;
}
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

}); // end DOMContentLoaded
</script>
